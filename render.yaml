services:
  - type: web
    name: fair-split
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
